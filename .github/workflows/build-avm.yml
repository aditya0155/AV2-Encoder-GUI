name: Build AV2 Reference Encoder

on:
  schedule:
    - cron: '0 0 * * 0' # Every Sunday at midnight UTC
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all tags to perform checks

      - name: Check for Upstream Updates
        id: check_update
        run: |
          # Get upstream latest commit hash
          $upstream_commit = (git ls-remote https://github.com/AOMediaCodec/avm.git HEAD | Out-String).Substring(0, 8)
          Write-Output "Latest upstream commit: $upstream_commit"
          echo "upstream_commit=$upstream_commit" >> $env:GITHUB_OUTPUT
          
          # Check if tag already exists in our repo
          $tag_name = "avm-$upstream_commit"
          $tag_exists = git tag -l $tag_name
          
          if ($tag_exists -and ("${{ github.event_name }}" -eq "schedule")) {
            Write-Output "Upstream commit $upstream_commit is already built and tagged."
            echo "should_build=false" >> $env:GITHUB_OUTPUT
          } else {
            Write-Output "Proceeding with build for tag: $tag_name"
            echo "should_build=true" >> $env:GITHUB_OUTPUT
            if (github.ref -match "refs/tags/(v.*)") {
              echo "tag_name=$($Matches[1])" >> $env:GITHUB_OUTPUT
            } else {
              echo "tag_name=$tag_name" >> $env:GITHUB_OUTPUT
            }
          }
        shell: powershell

      - name: Setup NASM
        if: steps.check_update.outputs.should_build == 'true'
        uses: ilammy/setup-nasm@v1

      - name: Clone AVM Repository
        if: steps.check_update.outputs.should_build == 'true'
        run: |
          git clone --depth 1 https://github.com/AOMediaCodec/avm.git

      - name: Configure CMake
        if: steps.check_update.outputs.should_build == 'true'
        run: |
          cmake -S avm -B avm/build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release -DENABLE_DOCS=OFF -DENABLE_TESTS=OFF -DCONFIG_ML_PART_SPLIT=0 -DCONFIG_DIP_EXT_PRUNING=0 -DCONFIG_TENSORFLOW_LITE=0

      - name: Build avmenc
        if: steps.check_update.outputs.should_build == 'true'
        run: |
          cmake --build avm/build --config Release --target avmenc

      - name: Upload Artifact to Run
        if: steps.check_update.outputs.should_build == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: avmenc-windows
          path: avm/build/Release/avmenc.exe

      - name: Push Git Tag
        if: steps.check_update.outputs.should_build == 'true' && !startsWith(github.ref, 'refs/tags/')
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          if (-not (git tag -l ${{ steps.check_update.outputs.tag_name }})) {
            git tag ${{ steps.check_update.outputs.tag_name }}
            git push origin ${{ steps.check_update.outputs.tag_name }}
          }
        shell: powershell

      - name: Create Release and Upload Asset
        if: steps.check_update.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check_update.outputs.tag_name }}
          name: AV2 Reference Encoder (Commit ${{ steps.check_update.outputs.upstream_commit }})
          body: |
            Automated weekly build of the AV2 (AVM) reference encoder.
            Upstream commit: ${{ steps.check_update.outputs.upstream_commit }}
          files: avm/build/Release/avmenc.exe
